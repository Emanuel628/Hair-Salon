<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reset a Studio Sol admin password." />
    <title>Forgot Password | Studio Sol Admin</title>

    <script>
      if (new URLSearchParams(window.location.search).get("view") === "desktop") {
        document.documentElement.classList.add("pc-view");
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/auth.css" />
    <link rel="stylesheet" href="/pc-view.css" />
  </head>

  <body class="auth-page">
    <div class="auth-shell">
      <header class="auth-header" aria-label="Admin navigation">
        <a class="brand" href="/" aria-label="Back to Studio Sol home">
          <img src="/assets/studio-sol-mark.svg" alt="" class="brand__mark" />
          <span class="brand__name">Studio Sol</span>
        </a>
      </header>

      <main class="auth-main" aria-labelledby="forgot-title">
        <section class="auth-card">
          <p class="auth-kicker">Admin Access</p>
          <h1 id="forgot-title" class="auth-title">Reset password.</h1>
          <p class="auth-intro">
            Enter the admin email address and we’ll send a secure password reset link.
          </p>

          <form class="auth-form" action="#" method="post">
            <div class="form-field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>

            <button class="button button--primary auth-submit" type="submit">Send Reset Link</button>
          </form>

          <div class="auth-links">
            <a href="/admin/sign-in/">Back to sign in</a>
            <a href="/admin/register/">Register</a>
          </div>
        </section>
      </main>

      <footer class="site-footer auth-footer">
        <p>© Studio Sol. Concept by Mejor Tech.</p>
        <nav class="footer-links" aria-label="Footer links">
          <a href="/admin/forgot-password/?view=desktop">Desktop View</a>
          <a href="/admin/sign-in/">Admin</a>
        </nav>
      </footer>
    </div>
  </body>
</html>
